<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="Logo.webp" />
  <style>
    html {
  text-align: center;
  letter-spacing: 3px;
}

body {
  margin: 0;
}

@font-face {
  font-family: "ethnocentricregular";
  src: url("ethnocentric_rg-webfont.woff");
}

h1 {
  font-size: 1.8rem;
  color: white;
}

.topnav,
.card img {
  background-color: #143642;
}

.topnav {
  overflow: hidden;
  padding: 15px;
}

.topnav img {
  width: 60px;
  vertical-align: middle;
  margin-right: 10px;
}

.topnav h1 {
  display: inline;
  vertical-align: middle;
}

select {
  font-size: 0.85rem;
  text-align: center;
}

.content {
  padding: 10px;
  max-width: 600px;
  margin: 0 auto;
}

.card {
  background-color: #f8f7f9;
  margin-bottom: 15px;
  box-shadow: 2px 2px 12px 1px rgba(87, 86, 86, 0.5);
  padding-top: 10px;
  padding-bottom: 20px;
  border-radius: 10px;
  position: relative;
}

.card img {
  width: 100%;
  height: auto;
  border-radius: 10px;
  object-fit: cover;
}

.Connected {
  font-size: 0.9rem;
  background-color: #f8f7f9;
  padding: 10px;
  box-shadow: 2px 2px 12px 1px rgba(87, 86, 86, 0.5);
  border-radius: 10px;
}

.titlee,
label {
  color: #4d4c4c;
}

#connectionStatus,
#connectedDevicesCount,
.state,
#speed,
#time,
#distance,
h3,
select {
  color: #143642;
}

#connectionStatus,
#connectedDevicesCount {
  display: block;
}

#time,
#distance {
  text-align: center;
}

.state {
  font-size: 1.5rem;
}

#timer {
  font-size: 1rem;
}

.attention {
  font-size: 0.8rem;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 0.8rem;
}

#time,
#distance {
  width: 80%;
  padding: 8px;
  margin-top: 5px;
  box-sizing: border-box;
  border: 1px solid #143642;
  border-radius: 8px;
}

p,
button,
.attention,
h1,
h3,
.Connected,
.state,
#time,
#distance,
.titlee,
select {
  font-weight: lighter;
  font-family: "ethnocentricregular";
}

.social-links {
  display: flex;
  justify-content: space-around;
  padding-top: 10px;
}

.result,
.Connected,
#timer,
.attention,
option {
  color: #8c8c8c;
}

.buttom {
  color: rgb(20, 54, 66);
  border-radius: 8px;
  border-color: rgb(20, 54, 66, 0.5);
  padding: 8px;
  margin: 5px;
}

.Reset {
  border-radius: 8px;
  border-color: rgba(20, 54, 66, 0.8);
  padding: 8px;
  margin: 10px;
  color: rgba(212, 49, 49, 0.85);
}

.color-label,
.control-label {
  display: inline-block;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #143642;
  width: 80%;
}

.control-label {
  width: 100%;
}

.card#run,
#counter,
#Color,
#Connected,
#control,
#update,
#Player {
  display: none;
}

  </style>
  <title>KaStride</title>
</head>

<body>
  <div class="topnav">
    <img src="Logo.webp" alt />
    <h1>KaStride</h1>

    <div>
      <button id="Start" onclick="start()" class="buttom">Start</button>
    </div>

    <div class="content">
      <div class="Connected" id="Connected">
        Connection status
        <span id="connectionStatus">waiting</span> Connected Devices
        <span id="connectedDevicesCount">0</span>
      </div>
    </div>

    <div id="control">
      <div class="content">
        <select onchange="onlyshow(this.value)" class="control-label">
          <option value="Color">Color</option>
          <!-- <option value="Player">Player</option> -->
          <option value="counter">Counter</option>
          <option value="run">Run</option>
          <!-- <option value="update">Update</option> -->
        </select>
      </div>
    </div>

    <div class="card" id="Color">
      <h3>Color</h3>

      <p class="attention">please Select Color</p>
      <select id="lightSelector" onchange="changeLight()" class="color-label">
        <option hidden>select</option>
        <option value="1">Blue</option>
        <option value="2">Blue &amp; Green</option>
        <option value="3">Blue &amp; Green &amp; Red</option>
      </select>
    </div>

    <div class="card" id="Player">
      <h3>Player</h3>
      <p class="attention">please Select Player</p>
      <select id="PlayerSelector" onchange="changePlayer()" class="color-label">
        <option hidden>select</option>
        <option value="1" selected>1</option>
        <option value="2">2</option>
      </select>
    </div>

    <div class="card" id="counter">
      <h3>Counter</h3>
      <p class="state"><span id="count">%0%</span></p>
      <p class="count-increase" id="timer">00:00:00</p>
      <button class="Reset" onclick="resetTimer()">Reset Timer</button>
      <button class="Reset" onclick="resetCount()">Reset Counter</button>
    </div>

    <div class="card" id="run">
      <h3>Run</h3>
      <label class="titlee" for="distance">Distance (m): </label>
      <input type="number" id="distance" placeholder="Enter distance" min="1" oninput="calculateSpeed()" />
      <br />
      <label class="titlee" for="time">Time (s): </label>
      <input type="number" id="time" placeholder="Enter time" min="1" oninput="calculateSpeed()" />
      <br />
      <br />
      <button onclick="toggleTimer();" class="buttom">Start Timer</button>
      <br />
      <p class="result">Speed: <span id="speed">0</span> m/sec</p>
    </div>

    <div class="card" id="update">
      <h3>Update</h3>
      <p class="attention">
        please be <span style="color: rgb(205, 9, 9)">careful</span>
      </p>
      <iframe id="updateFrame" src="" style="border: none; width: 90%; height: 400px"></iframe>
    </div>
  </div>

</body>

</html>
